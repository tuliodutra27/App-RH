services:
  analisador-rh:
    build: .
    image: analisador-rh:latest
    container_name: analisador-rh
    restart: unless-stopped

    ports:
      - "${APP_PORT:-5000}:5000"

    volumes:
      # Persiste snapshots, relatórios e histórico entre reinicializações
      - ./data:/data

    environment:
      # Flask
      - SECRET_KEY=${SECRET_KEY}
      - DATA_DIR=/data

      # Active Directory
      - AD_SERVER=${AD_SERVER}
      - AD_PORT=${AD_PORT:-389}
      - AD_USE_SSL=${AD_USE_SSL:-false}
      - AD_DOMAIN=${AD_DOMAIN}
      - AD_BASE_DN=${AD_BASE_DN}
      - AD_TI_GROUP_CN=${AD_TI_GROUP_CN:-TI}

      # Modo desenvolvimento (NUNCA usar em produção)
      - DEV_MODE=${DEV_MODE:-false}
      - DEV_USERS=${DEV_USERS:-{}}

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
